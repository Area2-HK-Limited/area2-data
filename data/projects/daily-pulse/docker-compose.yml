version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: daily-pulse-db
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse_secret_2024}
      POSTGRES_DB: daily_pulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d daily_pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pulse-network

  # PostgREST API
  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: daily-pulse-api
    environment:
      PGRST_DB_URI: postgres://pulse:${POSTGRES_PASSWORD:-pulse_secret_2024}@postgres:5432/daily_pulse
      PGRST_DB_SCHEMA: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      PGRST_SERVER_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pulse-network

  # Nuxt Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daily-pulse-web
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3001
      NUXT_PUBLIC_YFINANCE_API: ${YFINANCE_API}
      NUXT_PUBLIC_YFINANCE_KEY: ${YFINANCE_KEY}
      NUXT_OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - postgrest
    networks:
      - pulse-network

volumes:
  postgres_data:

networks:
  pulse-network:
    driver: bridge
