<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; }
  .page {
    width: 210mm; height: 297mm;
    page-break-after: always;
    display: flex; flex-wrap: wrap;
    align-content: flex-start;
    padding: 5mm;
  }
  .page:last-child { page-break-after: avoid; }
  .img-cell {
    width: 95mm; height: 135mm;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 1px solid #eee;
    padding: 3mm;
  }
  .img-cell img {
    max-width: 88mm; max-height: 115mm;
    object-fit: contain;
  }
  .img-cell .label {
    font-size: 8pt; color: #888; margin-top: 2mm;
    text-align: center;
  }
  .header {
    width: 210mm; height: 12mm;
    background: #1a4a7a; color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 11pt; font-weight: bold;
    letter-spacing: 0.5mm;
  }
  @media print {
    .page { page-break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="header">Patient: YUAN YU CHAN | MR Whole Spine (2026-03-31) | 脊椎 MRI 影像精選</div>
</body>
</html>
